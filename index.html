<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2b4a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>泡泡堂 · Bubble Blast</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; touch-action:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0d1526; font-family:-apple-system,Segoe UI,Roboto,sans-serif; }
  #game { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 50% 30%, #1d3a5f 0%, #0d1526 80%); }
  canvas { image-rendering:pixelated; box-shadow:0 0 40px rgba(0,0,0,.6); border-radius:6px; max-width:100%; max-height:100%; }

  /* Touch controls */
  .pad { position:fixed; bottom:24px; z-index:20; opacity:.92; }
  #stick { left:24px; width:152px; height:152px; border-radius:50%;
    background:rgba(255,255,255,.10); border:2px solid rgba(255,255,255,.18);
    backdrop-filter:blur(4px); box-shadow:0 2px 10px rgba(0,0,0,.4); }
  #knob { position:absolute; left:50%; top:50%; width:66px; height:66px; margin:-33px 0 0 -33px;
    border-radius:50%; background:radial-gradient(circle at 40% 35%, #eaf6ff, #9fc3e6);
    box-shadow:0 3px 12px rgba(0,0,0,.45), inset 0 2px 5px rgba(255,255,255,.6);
    transition:transform .03s linear; }
  #bombwrap { right:24px; }
  #bomb { width:108px; height:108px; border:none; border-radius:50%; font-size:46px;
    background:radial-gradient(circle at 40% 35%, #5fd0ff, #2a7fd6); color:#fff;
    box-shadow:0 4px 14px rgba(0,0,0,.5), inset 0 2px 6px rgba(255,255,255,.4); }
  #bomb:active { transform:scale(.93); }

  /* Overlays */
  .overlay { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; color:#fff;
    background:rgba(8,14,28,.86); backdrop-filter:blur(6px); padding:24px; }
  .overlay.hidden { display:none; }
  .title { font-size:clamp(38px,11vw,76px); font-weight:800; letter-spacing:2px;
    background:linear-gradient(180deg,#9fe7ff,#3a9fe0); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 4px 18px rgba(0,0,0,.4); }
  .subtitle { font-size:clamp(16px,4.5vw,24px); color:#bcd6f0; margin-top:4px; margin-bottom:6px; }
  .hint { font-size:14px; color:#7e96b5; max-width:420px; line-height:1.6; margin-top:18px; }
  .hint b { color:#cfe6ff; }
  .play { margin-top:30px; padding:18px 54px; font-size:26px; font-weight:700; color:#06243a;
    border:none; border-radius:40px; background:linear-gradient(180deg,#ffe27a,#ffb84d);
    box-shadow:0 6px 20px rgba(0,0,0,.45); cursor:pointer; }
  .play:active { transform:translateY(2px); }
  .result { font-size:clamp(42px,13vw,92px); font-weight:900; }
  .win { color:#ffd24d; } .lose { color:#ff6b6b; }
  .diffrow { display:flex; gap:12px; margin-top:24px; }
  .diff { padding:10px 18px; border-radius:30px; border:2px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.06); color:#cfe6ff; font-size:16px; }
  .diff.sel { border-color:#ffe27a; background:rgba(255,226,122,.16); color:#fff; }
  #mute { position:fixed; top:16px; right:16px; z-index:40; width:46px; height:46px; border:none;
    border-radius:50%; background:rgba(255,255,255,.12); color:#fff; font-size:22px; }
</style>
</head>
<body>
<div id="game"><canvas id="cv"></canvas></div>

<button id="mute">🔊</button>

<div class="pad" id="stick"><div id="knob"></div></div>
<div class="pad" id="bombwrap"><button id="bomb">🫧</button></div>

<div class="overlay" id="startScreen">
  <div class="title">泡泡堂</div>
  <div class="subtitle">Bubble Blast · 海盗 Pirate Cove</div>
  <div class="diffrow">
    <div class="diff" data-d="easy">Easy</div>
    <div class="diff sel" data-d="normal">Normal</div>
    <div class="diff" data-d="hard">Hard</div>
  </div>
  <button class="play" id="playBtn">PLAY ▶</button>
  <div class="hint">Trap a rival in your <b>water bubble</b> 🫧, then pop the bubble with another blast to knock them out. Grab <b>💧 range</b>, <b>🫧 extra bubbles</b>, <b>👟 speed</b>. Last sailor standing wins!<br>Move: D-pad / arrow keys · Bubble: 🫧 / spacebar</div>
</div>

<div class="overlay hidden" id="overScreen">
  <div class="result" id="resultText">YOU WIN</div>
  <button class="play" id="againBtn">PLAY AGAIN ▶</button>
</div>

<script>
// ====================== CONFIG ======================
const COLS = 15, ROWS = 13, TILE = 40;
const FUSE = 2.0;        // bubble fuse seconds
const BLAST_TIME = 0.5;  // water lasts
const TRAP_TIME = 2.6;   // trapped-in-bubble duration
const BASE_MOVE = 0.125; // sec per tile (player) — snappy
const POWERUP_CHANCE = 0.36;
const BARREL_FILL = 0.78;

const FLOOR=0, WALL=1, BARREL=2;
const PU_RANGE=0, PU_BUBBLE=1, PU_SPEED=2;

const SKIN='#fde7cf', SKIN_LT='#fff8ee';   // characters are cream-bodied
const CAPS = ['#e23b3b','#36b85c','#3f86e8']; // bot caps: red, green, blue

// ====================== STATE ======================
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = COLS*TILE; cv.height = ROWS*TILE;

let grid, players, bubbles, blasts, powerups, state='start', diff='normal';
let cannonSet, shipSet, shipCenter;
let burstCounter = 0, muted=false;
let last = 0;

// ====================== AUDIO (tiny WebAudio) ======================
let actx=null;
function beep(freq, dur, type, vol){
  if(muted) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    g.gain.value=(vol||0.05); o.connect(g); g.connect(actx.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+(dur||0.1));
    o.stop(actx.currentTime+(dur||0.1)+0.02);
  }catch(e){}
}
const sfx = {
  place:()=>beep(520,0.08,'sine',0.05),
  burst:()=>{beep(150,0.18,'sawtooth',0.07); beep(90,0.22,'square',0.05);},
  power:()=>{beep(660,0.07,'square',0.06); setTimeout(()=>beep(990,0.09,'square',0.06),70);},
  trap:()=>beep(300,0.15,'sine',0.06),
  pop:()=>{beep(420,0.1,'square',0.07); setTimeout(()=>beep(180,0.16,'sawtooth',0.06),60);},
  win:()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'square',0.06),i*140)),
  lose:()=>[392,330,262].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'sawtooth',0.06),i*160)),
};

// ====================== HELPERS ======================
const inB = (x,y)=> x>=0&&x<COLS&&y>=0&&y<ROWS;
const key = (x,y)=> x+','+y;
function bubbleAt(x,y){ return bubbles.find(b=>b.x===x&&b.y===y); }
function passable(x,y){ return inB(x,y) && grid[y][x]===FLOOR && !bubbleAt(x,y); }
function tileOf(p){ // tile an entity currently occupies (snap by move progress)
  if(!p.moving) return {x:p.tx, y:p.ty};
  return p.t<0.5 ? {x:p.fx, y:p.fy} : {x:p.tox, y:p.toy};
}

// water cells a blast at (x,y,range) would cover, stopping at walls/barrels
function blastCells(x,y,range){
  const cells=[{x,y}];
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  for(const [dx,dy] of dirs){
    for(let i=1;i<=range;i++){
      const nx=x+dx*i, ny=y+dy*i;
      if(!inB(nx,ny)||grid[ny][nx]===WALL) break;
      cells.push({x:nx,y:ny});
      if(grid[ny][nx]===BARREL) break; // water destroys the barrel then stops
    }
  }
  return cells;
}

// ====================== MAP ======================
function buildMap(){
  grid = Array.from({length:ROWS}, ()=>Array(COLS).fill(FLOOR));
  cannonSet = new Set(); shipSet = new Set();
  // hull border
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++)
    if(x===0||y===0||x===COLS-1||y===ROWS-1) grid[y][x]=WALL;
  // central pirate ship — 3x3 indestructible centrepiece
  shipCenter = { x:(COLS-1)>>1, y:(ROWS-1)>>1 };
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
    const x=shipCenter.x+dx, y=shipCenter.y+dy; grid[y][x]=WALL; shipSet.add(key(x,y));
  }
  // four rope-wrapped cannonballs — the only other hard blocks
  for(const [x,y] of [[2,2],[COLS-3,2],[2,ROWS-3],[COLS-3,ROWS-3]]){
    grid[y][x]=WALL; cannonSet.add(key(x,y));
  }
  // spawn safe zones (keep an L clear at each corner)
  const safe = new Set();
  const corners=[[1,1],[COLS-2,1],[1,ROWS-2],[COLS-2,ROWS-2]];
  for(const [cx,cy] of corners){
    [[0,0],[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
      const x=cx+dx, y=cy+dy; if(inB(x,y)) safe.add(key(x,y));
    });
  }
  // everything else is a destructible crate -> the whole map can be cleared
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++){
    if(grid[y][x]===FLOOR && !safe.has(key(x,y)) && Math.random()<BARREL_FILL)
      grid[y][x]=BARREL;
  }
}

function makePlayer(tx,ty,isHuman,capColor,botDiff){
  return { tx,ty, fx:tx,fy:ty, tox:tx,toy:ty, t:0, moving:false, dir:'down',
    isHuman, color:SKIN, colorLight:SKIN_LT, capColor:capColor||'#1a1a1f', alive:true,
    range:1, maxBubbles:1, active:0, speed:0,
    trapped:false, trappedBy:null, trapTimer:0,
    botDiff, think:0, anim:0, target:null, targetTtl:0 };
}

// ====================== RESET / START ======================
function reset(){
  buildMap();
  bubbles=[]; blasts=[]; powerups=[]; burstCounter=0;
  players=[
    makePlayer(1,1,true,'#1a1a1f'),
    makePlayer(COLS-2,1,false,CAPS[0],botPlan(0)),
    makePlayer(1,ROWS-2,false,CAPS[1],botPlan(1)),
    makePlayer(COLS-2,ROWS-2,false,CAPS[2],botPlan(2)),
  ];
}
// difficulty per bot, blended with chosen level so "mixed" feels varied
function botPlan(i){
  const base = {easy:{move:0.23,trap:0.5,react:0.6},
                normal:{move:0.18,trap:0.8,react:0.9},
                hard:{move:0.14,trap:1,react:1}}[diff];
  const spice=[{move:+0.05,trap:-0.15},{move:0,trap:0},{move:-0.03,trap:+0.1}][i];
  return { move:Math.max(0.1,base.move+spice.move),
           trap:Math.min(1,Math.max(0,base.trap+spice.trap)),
           react:base.react };
}

function startGame(){
  reset(); state='playing';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
}
function endGame(win){
  state='over';
  const r=document.getElementById('resultText');
  r.textContent = win ? 'YOU WIN 🏆' : 'POPPED 💀';
  r.className = 'result '+(win?'win':'lose');
  document.getElementById('overScreen').classList.remove('hidden');
  win ? sfx.win() : sfx.lose();
}

// ====================== INPUT ======================
const held=[]; let wantBubble=false;
function pressDir(d){ if(!held.includes(d)) held.push(d); mashEscape(); }
function releaseDir(d){ const i=held.indexOf(d); if(i>=0) held.splice(i,1); }
function mashEscape(){ // tapping while trapped helps you wriggle free
  const me=players[0];
  if(me && me.trapped) me.trapTimer=Math.max(0, me.trapTimer-0.35);
}
const KEYMAP={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
  w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};
addEventListener('keydown',e=>{
  if(e.key===' '){ wantBubble=true; e.preventDefault(); return; }
  const d=KEYMAP[e.key]; if(d){ pressDir(d); e.preventDefault(); }
});
addEventListener('keyup',e=>{ const d=KEYMAP[e.key]; if(d) releaseDir(d); });

function bindBtn(id,onDown,onUp){
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{e.preventDefault(); onDown();});
  el.addEventListener('pointerup',e=>{e.preventDefault(); onUp&&onUp();});
  el.addEventListener('pointerleave',e=>{onUp&&onUp();});
  el.addEventListener('pointercancel',e=>{onUp&&onUp();});
}
bindBtn('bomb',()=>{ wantBubble=true; });

// Analog joystick: drag the knob; angle picks the move direction (held until released).
(function(){
  const base=document.getElementById('stick'), knob=document.getElementById('knob');
  const R=52, DEAD=14; let active=false, cur=null;
  const setKnob=(dx,dy)=> knob.style.transform=`translate(${dx}px,${dy}px)`;
  function handle(cx,cy){
    const r=base.getBoundingClientRect();
    let dx=cx-(r.left+r.width/2), dy=cy-(r.top+r.height/2);
    const mag=Math.hypot(dx,dy)||1;
    if(mag>R){ dx=dx/mag*R; dy=dy/mag*R; }
    setKnob(dx,dy);
    let d=null;
    if(mag>DEAD) d = Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up');
    if(d!==cur){ cur=d; held.length=0; if(d){ held.push(d); mashEscape(); } }
  }
  base.addEventListener('pointerdown',e=>{ active=true; base.setPointerCapture(e.pointerId); handle(e.clientX,e.clientY); e.preventDefault(); });
  base.addEventListener('pointermove',e=>{ if(active){ handle(e.clientX,e.clientY); e.preventDefault(); } });
  const end=()=>{ active=false; cur=null; held.length=0; setKnob(0,0); };
  base.addEventListener('pointerup',end);
  base.addEventListener('pointercancel',end);
})();

document.getElementById('playBtn').onclick=startGame;
document.getElementById('againBtn').onclick=startGame;
document.querySelectorAll('.diff').forEach(el=>el.onclick=()=>{
  diff=el.dataset.d;
  document.querySelectorAll('.diff').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
});
document.getElementById('mute').onclick=function(){ muted=!muted; this.textContent=muted?'🔇':'🔊'; };

// ====================== BUBBLES / BLASTS ======================
function placeBubble(p){
  const {x,y}=tileOf(p);
  if(p.active>=p.maxBubbles || bubbleAt(x,y)) return;
  bubbles.push({x,y,fuse:FUSE,range:p.range,owner:p});
  p.active++; sfx.place();
}
function burst(b){
  const id=++burstCounter;
  const cells=blastCells(b.x,b.y,b.range);
  for(const c of cells){
    if(grid[c.y][c.x]===BARREL){
      grid[c.y][c.x]=FLOOR;
      if(Math.random()<POWERUP_CHANCE)
        powerups.push({x:c.x,y:c.y,type:Math.floor(Math.random()*3)});
    }
    blasts.push({x:c.x,y:c.y,timer:BLAST_TIME,id});
    const chain=bubbleAt(c.x,c.y);
    if(chain && chain!==b && chain.fuse>0) chain.fuse=0; // chain reaction
  }
  sfx.burst();
}

// ====================== AI ======================
// BFS: first-step direction from (sx,sy) to nearest tile where isGoal, walking canEnter tiles
function bfsStep(sx,sy,isGoal,canEnter){
  if(isGoal(sx,sy)) return null;
  const q=[[sx,sy]], seen=new Set([key(sx,sy)]), from=new Map();
  const dirs=[['up',0,-1],['down',0,1],['left',-1,0],['right',1,0]];
  while(q.length){
    const [cx,cy]=q.shift();
    for(const [name,dx,dy] of dirs){
      const nx=cx+dx, ny=cy+dy, k=key(nx,ny);
      if(seen.has(k)||!inB(nx,ny)) continue;
      if(!canEnter(nx,ny)) continue;
      seen.add(k); from.set(k,{px:cx,py:cy,dir:name});
      if(isGoal(nx,ny)){
        let cur={px:nx,py:ny,dir:name}, step=cur;
        while(!(cur.px===sx&&cur.py===sy)){ step=cur; cur=from.get(key(cur.px,cur.py)); if(!cur) break; }
        return step.dir;
      }
      q.push([nx,ny]);
    }
  }
  return null;
}
function lineClear(x1,y1,x2,y2){
  if(x1===x2){ const a=Math.min(y1,y2),b=Math.max(y1,y2);
    for(let y=a+1;y<b;y++) if(grid[y][x1]!==FLOOR) return false; return true; }
  if(y1===y2){ const a=Math.min(x1,x2),b=Math.max(x1,x2);
    for(let x=a+1;x<b;x++) if(grid[y1][x]!==FLOOR) return false; return true; }
  return false;
}
// nearest tile (returns the goal tile itself, or null) via BFS over canEnter tiles
function nearestTile(sx,sy,pred,canEnter){
  if(pred(sx,sy)) return {x:sx,y:sy};
  const q=[[sx,sy]], seen=new Set([key(sx,sy)]);
  const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
  while(q.length){
    const [cx,cy]=q.shift();
    for(const [dx,dy] of dirs){
      const nx=cx+dx, ny=cy+dy, k=key(nx,ny);
      if(seen.has(k)||!inB(nx,ny)||!canEnter(nx,ny)) continue;
      seen.add(k); if(pred(nx,ny)) return {x:nx,y:ny}; q.push([nx,ny]);
    }
  }
  return null;
}
// Can a bubble dropped at (x,y) be survived? You may RUN ALONG the blast line —
// you just need to reach a tile beyond it before it pops (2s is plenty).
function escapeExists(p,x,y,danger){
  const cross=new Set(blastCells(x,y,p.range).map(c=>key(c.x,c.y)));
  return !!bfsStep(x,y,
    (gx,gy)=>!cross.has(key(gx,gy)) && !danger.has(key(gx,gy)),
    (nx,ny)=>passable(nx,ny) && !danger.has(key(nx,ny)));
}
function adjacentBarrel(x,y){
  return [[1,0],[-1,0],[0,1],[0,-1]].some(([dx,dy])=>{
    const bx=x+dx,by=y+dy; return inB(bx,by)&&grid[by][bx]===BARREL; });
}
function pickTarget(p,x,y,danger){
  const canEnter=(nx,ny)=>passable(nx,ny)&&!danger.has(key(nx,ny));
  // grab a nearby power-up
  let t=nearestTile(x,y,(gx,gy)=>powerups.some(pu=>pu.x===gx&&pu.y===gy),canEnter);
  if(t) return t;
  // a tile beside a barrel we can safely bomb from
  t=nearestTile(x,y,(gx,gy)=>adjacentBarrel(gx,gy)&&escapeExists(p,gx,gy,danger),canEnter);
  if(t) return t;
  return null;
}
// first step toward (tx,ty) TREATING BARRELS AS PASSABLE — used to dig toward the player
function digStep(sx,sy,tx,ty,danger){
  return bfsStep(sx,sy,(gx,gy)=>gx===tx&&gy===ty,
    (nx,ny)=> inB(nx,ny) && grid[ny][nx]!==WALL && !bubbleAt(nx,ny) && !danger.has(key(nx,ny)));
}

function botAct(p, danger){
  const here=tileOf(p), x=here.x, y=here.y;

  // 1) standing in danger -> run to the nearest safe tile (may run through the blast line)
  if(danger.has(key(x,y))){
    p.target=null;
    return { dir: bfsStep(x,y,(gx,gy)=>!danger.has(key(gx,gy)),(nx,ny)=>passable(nx,ny)), bubble:false };
  }

  const me=players[0];
  const mt = me.alive ? tileOf(me) : null;
  const canBomb = p.active<p.maxBubbles && escapeExists(p,x,y,danger);

  // 2) ATTACK: already lined up with the player within range -> bomb them
  if(mt && canBomb && (mt.x===x||mt.y===y)
     && Math.abs(mt.x-x)+Math.abs(mt.y-y)<=p.range && lineClear(x,y,mt.x,mt.y)
     && Math.random()<p.botDiff.trap){
    p.target=null; return { dir:null, bubble:true };
  }

  // 3) HUNT: advance toward the player, blasting through any barrel in the way
  if(mt && Math.random()<p.botDiff.react){
    const d=digStep(x,y,mt.x,mt.y,danger);
    if(d){
      const [dx,dy]=DIRV[d], nx=x+dx, ny=y+dy;
      if(grid[ny][nx]===BARREL){
        if(canBomb && Math.random()<p.botDiff.trap){ p.target=null; return { dir:null, bubble:true }; }
        // can't safely blast right now -> fall through to farming
      } else { p.target=null; return { dir:d, bubble:false }; }
    }
  }

  // 4) FARM: bomb an adjacent barrel, else head to a committed target (persisted -> no jitter)
  if(canBomb && adjacentBarrel(x,y) && Math.random()<p.botDiff.trap){ p.target=null; return { dir:null, bubble:true }; }
  if(!p.target || (p.target.x===x&&p.target.y===y) || p.targetTtl<=0
     || !passable(p.target.x,p.target.y)){
    p.target = pickTarget(p,x,y,danger);
    p.targetTtl = 50;
  }
  p.targetTtl--;
  let dir=null;
  if(p.target)
    dir=bfsStep(x,y,(gx,gy)=>gx===p.target.x&&gy===p.target.y,
                    (nx,ny)=>passable(nx,ny)&&!danger.has(key(nx,ny)));
  if(!dir){ // nothing reachable -> drift to a random safe neighbour
    p.target=null;
    const opts=[[1,0,'right'],[-1,0,'left'],[0,1,'down'],[0,-1,'up']]
      .filter(([dx,dy])=>passable(x+dx,y+dy)&&!danger.has(key(x+dx,y+dy)));
    if(opts.length) dir=opts[Math.floor(Math.random()*opts.length)][2];
  }
  return { dir, bubble:false };
}

// ====================== UPDATE ======================
function moveDur(p){ return Math.max(0.08, BASE_MOVE - 0.022*p.speed); }
function botMoveDur(p){ return Math.max(0.09, p.botDiff.move - 0.02*p.speed); }
const DIRV={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};

function update(dt){
  // bubbles fuse + chain bursts
  for(const b of bubbles) b.fuse-=dt;
  let popped=true;
  while(popped){
    popped=false;
    for(let i=bubbles.length-1;i>=0;i--){
      if(bubbles[i].fuse<=0){
        const b=bubbles.splice(i,1)[0];
        if(b.owner.active>0) b.owner.active--;
        burst(b); popped=true;
      }
    }
  }
  // blasts decay
  for(let i=blasts.length-1;i>=0;i--){ blasts[i].timer-=dt; if(blasts[i].timer<=0) blasts.splice(i,1); }

  // shared danger map for bots
  const danger=new Set();
  for(const bl of blasts) danger.add(key(bl.x,bl.y));
  for(const b of bubbles) for(const c of blastCells(b.x,b.y,b.range)) danger.add(key(c.x,c.y));

  // entities
  for(const p of players){
    if(!p.alive) continue;
    p.anim+=dt;

    if(p.trapped){
      p.trapTimer-=dt;
      if(p.trapTimer<=0){ p.trapped=false; p.trappedBy=null; }
      continue; // can't move while trapped
    }

    // pick direction / action when settled on a tile
    if(!p.moving){
      let dir=null, bubble=false;
      if(p.isHuman){
        dir = held.length ? held[held.length-1] : null;
        if(wantBubble){ bubble=true; }
      } else {
        p.think-=dt;
        if(p.think<=0){ p.think=0.05; const a=botAct(p,danger); dir=a.dir; bubble=a.bubble; p._dir=dir; }
        else dir=p._dir;
      }
      if(bubble) placeBubble(p);
      if(dir){
        const [dx,dy]=DIRV[dir]; const nx=p.tx+dx, ny=p.ty+dy;
        if(passable(nx,ny)){ p.moving=true; p.fx=p.tx; p.fy=p.ty; p.tox=nx; p.toy=ny; p.t=0; p.dir=dir; }
      }
    }
    // advance movement
    if(p.moving){
      p.t += dt/(p.isHuman?moveDur(p):botMoveDur(p));
      if(p.t>=1){
        p.t=0; p.moving=false; p.tx=p.tox; p.ty=p.toy;
        // pickup
        for(let i=powerups.length-1;i>=0;i--){
          if(powerups[i].x===p.tx && powerups[i].y===p.ty){
            const t=powerups.splice(i,1)[0].type;
            if(t===PU_RANGE) p.range=Math.min(8,p.range+1);
            else if(t===PU_BUBBLE) p.maxBubbles=Math.min(8,p.maxBubbles+1);
            else p.speed=Math.min(5,p.speed+1);
            if(p.isHuman) sfx.power();
          }
        }
      }
    }
  }
  wantBubble=false;

  // blast vs entities: trap fresh victims, pop already-trapped ones
  for(const p of players){
    if(!p.alive) continue;
    const {x,y}=tileOf(p);
    const hits=blasts.filter(bl=>bl.x===x&&bl.y===y);
    if(!hits.length) continue;
    if(p.trapped){
      if(hits.some(h=>h.id!==p.trappedBy)){
        p.alive=false; if(p.isHuman) sfx.pop(); else sfx.pop();
      }
    } else {
      p.trapped=true; p.trappedBy=hits[0].id; p.trapTimer=TRAP_TIME;
      p.moving=false; p.tx=x; p.ty=y;
      sfx.trap();
    }
  }

  // win/lose
  const alive=players.filter(p=>p.alive);
  const human=players[0];
  if(!human.alive) endGame(false);
  else if(alive.length<=1) endGame(true);
}

// ====================== RENDER ======================
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ---- pirate-cove tiles ----
function drawCrate(px,py){
  ctx.fillStyle='#e7b24e'; roundRect(px+2,py+2,TILE-4,TILE-4,5); ctx.fill();
  ctx.fillStyle='#d29a3a'; roundRect(px+5,py+5,TILE-10,TILE-10,3); ctx.fill();
  ctx.strokeStyle='#9c6a22'; ctx.lineWidth=2.5; ctx.strokeRect(px+4,py+4,TILE-8,TILE-8);
  ctx.beginPath(); ctx.moveTo(px+5,py+5); ctx.lineTo(px+TILE-5,py+TILE-5);
  ctx.moveTo(px+TILE-5,py+5); ctx.lineTo(px+5,py+TILE-5); ctx.stroke();
  ctx.fillStyle='rgba(255,242,205,.30)'; roundRect(px+5,py+5,TILE-10,4,2); ctx.fill();
}
function drawHull(px,py){
  ctx.fillStyle='#5d3a1b'; ctx.fillRect(px,py,TILE,TILE);
  ctx.fillStyle='#6e4622'; roundRect(px+2,py+2,TILE-4,TILE-4,3); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.fillRect(px,py+TILE-4,TILE,4);
  ctx.fillStyle='rgba(255,210,150,.10)'; ctx.fillRect(px+3,py+3,TILE-6,3);
}
function drawDeck(px,py){
  ctx.fillStyle='#7a4f26'; ctx.fillRect(px,py,TILE,TILE);
  ctx.fillStyle='rgba(0,0,0,.14)'; ctx.fillRect(px,py+TILE-4,TILE,4);
  ctx.fillStyle='rgba(255,225,175,.10)'; ctx.fillRect(px,py,TILE,3);
}
function drawCannonball(px,py){
  ctx.fillStyle='#6b451f'; roundRect(px+7,py+TILE-12,TILE-14,8,3); ctx.fill(); // stand
  const cx=px+TILE/2, cy=py+TILE/2-2, r=TILE*0.33;
  ctx.fillStyle='#23232a'; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.16)'; ctx.beginPath(); ctx.arc(cx-r*0.4,cy-r*0.4,r*0.28,0,7); ctx.fill();
  ctx.strokeStyle='#efe7d2'; ctx.lineWidth=2.4;
  ctx.beginPath(); ctx.arc(cx,cy,r*0.92,-0.6,0.8); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,r*0.6,-0.2,1.3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-r,cy); ctx.quadraticCurveTo(cx,cy+3,cx+r,cy-2); ctx.stroke();
}
function drawShip(){
  if(!shipCenter) return;
  const cx=shipCenter.x*TILE+TILE/2, top=(shipCenter.y-1)*TILE;
  ctx.fillStyle='#5e3a1a'; ctx.fillRect(cx-4, top+4, 8, TILE*3-10);          // mast
  ctx.fillStyle='#8a5a2c'; roundRect(cx-11, top+TILE*1.35, 22, 14, 3); ctx.fill(); // crow's nest
  ctx.strokeStyle='#5e3c1a'; ctx.lineWidth=2; ctx.strokeRect(cx-11, top+TILE*1.35, 22, 14);
  const fy=top+6;                                                            // jolly roger
  ctx.fillStyle='#16161b';
  ctx.beginPath(); ctx.moveTo(cx+4,fy); ctx.lineTo(cx+32,fy+5); ctx.lineTo(cx+32,fy+20); ctx.lineTo(cx+4,fy+25); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='14px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('☠', cx+19, fy+13);
}

// ---- characters ----
function drawCap(p,cx,topY){
  if(p.isHuman){ // pirate captain tricorn
    ctx.fillStyle='#1c1c22';
    ctx.beginPath(); ctx.moveTo(cx-17,topY+4);
    ctx.quadraticCurveTo(cx,topY-15,cx+17,topY+4);
    ctx.quadraticCurveTo(cx,topY+1,cx-17,topY+4); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#e8c24a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx-15,topY+3); ctx.quadraticCurveTo(cx,topY-12,cx+15,topY+3); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='9px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('☠',cx,topY-3);
  } else { // colored dome cap with white spots
    ctx.fillStyle=p.capColor;
    ctx.beginPath(); ctx.arc(cx,topY+4,13,Math.PI,2*Math.PI); ctx.fill();
    ctx.fillRect(cx-13,topY+3,26,4);
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.beginPath(); ctx.arc(cx-5,topY,2.1,0,7); ctx.arc(cx+5,topY+1,1.7,0,7); ctx.arc(cx+1,topY-3,1.5,0,7); ctx.fill();
  }
}
function drawCharacter(p,cx,cy){
  const R=TILE*0.32, dir=p.dir||'down';
  const wob=p.moving?Math.sin(p.anim*18)*1.3:0, by=cy+wob;
  const step=p.moving?Math.sin(p.anim*18)*3:0;
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(cx,cy+R+6,R*0.95,4,0,0,7); ctx.fill();
  ctx.fillStyle='#7a4a22';
  ctx.beginPath(); ctx.ellipse(cx-6,cy+R+3+step,5,3.4,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+6,cy+R+3-step,5,3.4,0,0,7); ctx.fill();
  const g=ctx.createLinearGradient(cx,by-R,cx,by+R);
  g.addColorStop(0,p.colorLight); g.addColorStop(1,p.color);
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,by,R,0,7); ctx.fill();
  ctx.strokeStyle='rgba(90,55,25,.4)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='rgba(255,150,140,.45)';
  ctx.beginPath(); ctx.arc(cx-R*0.6,by+3,2.6,0,7); ctx.arc(cx+R*0.6,by+3,2.6,0,7); ctx.fill();
  const ex=dir==='left'?-2:dir==='right'?2:0, ey=dir==='up'?-2:dir==='down'?1:0;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(cx-5,by-2,3.4,4.2,0,0,7); ctx.ellipse(cx+5,by-2,3.4,4.2,0,0,7); ctx.fill();
  ctx.fillStyle='#1d1d22';
  ctx.beginPath(); ctx.arc(cx-5+ex,by-2+ey,1.9,0,7); ctx.arc(cx+5+ex,by-2+ey,1.9,0,7); ctx.fill();
  ctx.strokeStyle='#7a4a2a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,by+4,3,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
  drawCap(p,cx,by-R+3);
}

function render(){
  // floor (golden ship-deck planks)
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const px=x*TILE, py=y*TILE;
    ctx.fillStyle = (x+y)%2 ? '#d7a44b' : '#cb9a40';
    ctx.fillRect(px,py,TILE,TILE);
    ctx.fillStyle='rgba(90,55,20,.16)'; ctx.fillRect(px,py+TILE-3,TILE,3);
    ctx.fillStyle='rgba(255,230,180,.07)'; ctx.fillRect(px,py,TILE,2);
  }
  // hard blocks (hull / cannonballs / ship deck) + crates
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const px=x*TILE, py=y*TILE, v=grid[y][x];
    if(v===WALL){
      if(cannonSet.has(key(x,y))) drawCannonball(px,py);
      else if(shipSet.has(key(x,y))) drawDeck(px,py);
      else drawHull(px,py);
    } else if(v===BARREL){
      drawCrate(px,py);
    }
  }
  drawShip();
  // power-ups
  for(const pu of powerups){
    const px=pu.x*TILE+TILE/2, py=pu.y*TILE+TILE/2;
    const bob=Math.sin(performance.now()/250+pu.x)*2;
    ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(px,py+13,11,4,0,0,7); ctx.fill();
    ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(['💧','🫧','👟'][pu.type], px, py+bob);
  }
  // bubbles
  for(const b of bubbles){
    const px=b.x*TILE+TILE/2, py=b.y*TILE+TILE/2;
    const pulse=1+Math.sin(performance.now()/90)*0.06*(1-b.fuse/FUSE);
    const r=TILE*0.42*pulse;
    ctx.fillStyle='rgba(95,200,255,.45)'; ctx.beginPath(); ctx.arc(px,py,r,0,7); ctx.fill();
    ctx.strokeStyle='rgba(150,230,255,.9)'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.7)'; ctx.beginPath(); ctx.arc(px-r*0.3,py-r*0.3,r*0.22,0,7); ctx.fill();
  }
  // blasts (water)
  for(const bl of blasts){
    const px=bl.x*TILE, py=bl.y*TILE, a=Math.min(1,bl.timer/BLAST_TIME);
    ctx.fillStyle=`rgba(120,210,255,${0.55*a})`; roundRect(px+2,py+2,TILE-4,TILE-4,6); ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,${0.5*a})`; roundRect(px+7,py+7,TILE-14,TILE-14,5); ctx.fill();
  }
  // players
  for(const p of players){
    if(!p.alive) continue;
    let cx,cy;
    if(p.moving){ cx=(p.fx+(p.tox-p.fx)*p.t)*TILE+TILE/2; cy=(p.fy+(p.toy-p.fy)*p.t)*TILE+TILE/2; }
    else { cx=p.tx*TILE+TILE/2; cy=p.ty*TILE+TILE/2; }
    drawCharacter(p,cx,cy);
    // trapped bubble overlay
    if(p.trapped){
      const fl=p.trapTimer<0.8 && Math.floor(performance.now()/100)%2===0;
      ctx.strokeStyle=fl?'rgba(255,120,120,.95)':'rgba(150,230,255,.95)';
      ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx,cy,TILE*0.46,0,7); ctx.stroke();
      ctx.fillStyle='rgba(150,220,255,.22)'; ctx.beginPath(); ctx.arc(cx,cy,TILE*0.46,0,7); ctx.fill();
    }
  }
  // HUD: human power-ups
  const me=players[0];
  if(me){
    ctx.fillStyle='rgba(8,16,30,.55)'; roundRect(6,6,150,26,8); ctx.fill();
    ctx.font='15px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillStyle='#fff';
    ctx.fillText(`💧${me.range}  🫧${me.maxBubbles}  👟${me.speed+1}`, 14, 20);
    const n=players.filter(p=>p.alive).length;
    ctx.textAlign='right'; ctx.fillText(`Sailors: ${n}`, COLS*TILE-14, 20);
  }
}

// ====================== LOOP ======================
function loop(ts){
  const dt=Math.min(0.05,(ts-last)/1000)||0; last=ts;
  if(state==='playing') update(dt);
  if(state!=='start') render();
  requestAnimationFrame(loop);
}

// initial paint: build a map for the menu backdrop
buildMap(); players=[]; bubbles=[]; blasts=[]; powerups=[];
requestAnimationFrame(loop);

// register service worker for offline play (ignored when opened as a local file)
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
